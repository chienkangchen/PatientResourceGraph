<!DOCTYPE html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="SMART on FHIR 病人資源關聯圖 - 視覺化呈現病人的醫療資源與關聯">
        <title>病程脈絡總覽 - SMART on FHIR</title>
        <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
        <link href="./style.css" rel="stylesheet">
        <script src="./fhir-client.js"></script>
    </head>
    <body>
        <a href="#main-content" class="skip-link">跳至主要內容</a>
        <div class="app" role="application" aria-label="病程脈絡總覽">
            <header class="app-header" role="banner">
                <div class="title-block">
                    <img src="./logo.png" alt="SMART on FHIR 標誌" class="header-logo" loading="lazy">
                    <div class="title-text">
                        <h1>病程脈絡總覽</h1>
                        <p>SMART on FHIR 以就醫事件為核心的臨床資料視覺化</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="primary-btn" id="reload-btn" aria-label="重新載入病人資料">
                        <i class="fas fa-rotate" aria-hidden="true"></i> 重新載入
                    </button>
                </div>
            </header>

            <div id="error-banner" class="error-banner" role="alert" aria-live="assertive" style="display: none;"></div>

            <main class="app-main" id="main-content" role="main">
                <aside class="panel panel-left" role="complementary" aria-label="病人資訊面板">
                    <div class="panel-section">
                        <h2 id="patient-info-heading"><i class="fas fa-user" aria-hidden="true"></i> 病人資訊</h2>
                        <div id="patient-card" class="card" role="region" aria-labelledby="patient-info-heading" aria-live="polite">
                            <div class="loading">載入病人資料中...</div>
                        </div>
                    </div>

                    <div class="panel-section">
                        <h2 id="stats-heading"><i class="fas fa-chart-pie" aria-hidden="true"></i> 資源概覽</h2>
                        <div id="stats-card" class="card stats-grid" role="region" aria-labelledby="stats-heading" aria-live="polite">
                            <div class="loading">統計載入中...</div>
                        </div>
                    </div>
                </aside>

                <section class="panel panel-center" role="region" aria-label="就醫事件總覽">
                    <div id="timeline-container" class="timeline-container">
                        <div class="timeline-header">
                            <span><i class="fas fa-clock-rotate-left" aria-hidden="true"></i> 就醫時間軸</span>
                            <button class="ghost-btn timeline-reset-btn" id="timeline-reset-btn" style="display:none;">
                                <i class="fas fa-rotate-left" aria-hidden="true"></i> 顯示全部
                            </button>
                        </div>
                        <div id="timeline" class="timeline" role="list" aria-label="就醫時間軸">
                            <div class="timeline-empty">載入中...</div>
                        </div>
                    </div>
                    <div id="encounter-view" class="encounter-view" role="region" aria-label="就醫事件內容" aria-live="polite">
                        <div class="loading">載入中...</div>
                    </div>
                    <div id="graph-loading" class="graph-loading" role="status" aria-live="polite" style="display: none;">
                        <i class="fas fa-spinner" aria-hidden="true"></i> 正在載入資料...
                    </div>
                </section>

                <aside class="panel panel-right" role="complementary" aria-label="資源詳情面板">
                    <div id="filter-list" style="display:none;"></div>
                    <div class="panel-section">
                        <h2 id="detail-heading"><i class="fas fa-circle-info" aria-hidden="true"></i> 資源詳情</h2>
                        <div id="detail-card" class="card" role="region" aria-labelledby="detail-heading" aria-live="polite">
                            <div class="empty-state">
                                <i class="fas fa-hand-pointer"></i>
                                點選時間軸上的就醫事件查看詳情
                            </div>
                        </div>
                    </div>
                </aside>
            </main>
        </div>

        <script src="./app.js"></script>
        <script>
            // 延遲載入 favicon
            window.addEventListener('load', () => {
                const link = document.createElement('link');
                link.rel = 'icon';
                link.type = 'image/png';
                link.href = './favicon.png';
                document.head.appendChild(link);
            });
        </script>
    </body>
</html>
